<div id="loginBox" class="form-container login-box" style="display:none;">
  <h2 class="login-title">FAZER LOGIN</h2>
  <div class="input-group">
    <label>Nome de Usuário</label>
    <div class="input-icon">
      <i class="bi bi-person"></i>
      <input  type="text"  id="loginUsuario" placeholder="@nome"  oninput="formatarUsuario(this)"  required>
    </div>
  </div>
  <div class="input-group">
    <label>Senha</label>
    <div class="input-icon">
      <i class="bi bi-lock"></i>
      <input type="password"
             id="loginSenha"
             maxlength="4"
             inputmode="numeric"
             pattern="\d{4}"
             placeholder="****"
             required>
    </div>
  </div>
  <p id="loginErro" class="login-erro"></p>
  <button id="btnEntrar" class="btn-principal" onclick="fazerLogin()">
    ENTRAR
  </button>
  <button class="btn-secundario"
  onclick="window.open('https://t.me/dividir_contas_premium/23511','_blank')">

      Esqueceu a senha?
    </a>
  </p>

<div id="formulario" style="display:none; padding: 1rem;">
  <h3>CRIAR ANÚNCIO</h3>
  <form id="formAnuncio" onsubmit="enviarFormulario(event)">
	<label>Nome de Usuário: 
  <input type="text" id="usuario" name="usuario" required readonly>
</label><br>
	<label>Qual o Streaming:
  	<select name="streaming" id="selectStreaming" required></select>
	</label><br>
<label>Assinatura Extra (opcional):</label>
<div class="extras-container">
  <div class="toggle-extras" onclick="toggleExtras()">Mostrar extras ▼</div>
  <div id="containerExtras" class="checkbox-list hidden"></div>
</div>
	<label>Qual o Valor: <input type="number" placeholder="Ex: 12,50" min="0" step="0.25" name="valor" required></label><br>
	<label>Forma de Pagamento:
  	<select name="pagamento" required>
    	<option>KOTAS</option>
    	<option>PIX - Mensal</option>
    	<option>PIX - Bimestral</option>
    	<option>PIX - Trimestral</option>
    	<option>PIX - Semestral</option>
    	<option>PIX - Anual</option>
  	</select>
	</label><br>
<label>Link do Grupo Kotas (opcional): 
  <input type="number" placeholder="Últimos 6 dígitos do link" name="kotas" id="campoKotas" min="0" step="1" pattern="\d*" oninput="limitarKotas(this)">
</label><br>
	<label>Status da Conta:
  	<select name="status" required>
    	<option>Assinado</option>
    	<option>Aguardando</option>
    	<option>Reservando</option>
  	</select>
	</label><br>
	<label>Número de Vagas:
  	<select name="vagas" required>
    	<option>1 Vaga</option>
    	<option>2 Vagas</option>
    	<option>3 Vagas</option>
    	<option>4 Vagas</option>
    	<option>5 Vagas</option>
  	</select>
	</label><br>
	<label>Tipo de Acesso:
  	<select name="acesso" required>
    	<option>Login e Senha</option>
         <option>Ativar por Código</option>
    	<option>Convite por E-mail</option>
  	</select>
	</label><br>
	<label>Número do WhatsApp: 
  <input type="tel" name="whatsapp" id="whatsappInput" placeholder="Ex: 55XXXXXXXXXXX" pattern="\d{13}" maxlength="13" required oninput="formatarWhatsapp(this)">
</label><br>
<label>Tempo da Promoção (opcional):
  <select name="oferta">
    <option value="">Selecione</option>
    <option value="1 Mês">1 Mês</option>
    <option value="2 Meses">2 Meses</option>
    <option value="3 Meses">3 Meses</option>
    <option value="4 Meses">4 Meses</option>
  </select>
</label><br><br>
	<button type="submit">Enviar</button>
	<button type="button" onclick="voltarParaLista()">Cancelar</button>
  </form>
